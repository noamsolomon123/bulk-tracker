name: Build Android APK

# Builds an installable .apk on every push and uploads it as a downloadable
# artifact. Uses Expo "prebuild" (Continuous Native Generation) + Gradle, so it
# needs NO Expo account, EAS token, or signing secrets — the release build is
# signed with the auto-generated debug keystore, which is fine for sideloading.

on:
  push:
    branches: ['**']
  workflow_dispatch: {}

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    env:
      EXPO_NO_TELEMETRY: '1'
      CI: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (generate android project)
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=armeabi-v7a,arm64-v8a

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)
          echo "Found APK at: $APK_PATH"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bulk-tracker-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 30
