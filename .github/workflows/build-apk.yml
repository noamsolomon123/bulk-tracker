name: Build Android APK

# Builds an installable .apk on every push and makes it downloadable two ways:
#   1. As a GitHub Actions artifact (under the run's "Artifacts" section).
#   2. As an asset on the "latest" GitHub Release  ->  the most obvious, one-tap
#      download from your phone: <repo>/releases/latest
#
# Needs NO Expo account, EAS token, or signing secrets — the release build is
# signed with the auto-generated debug keystore, which is fine for sideloading.

on:
  push:
    branches: ['**']
  workflow_dispatch: {}

permissions:
  contents: write # required to publish the Release

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    env:
      EXPO_NO_TELEMETRY: '1'
      CI: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          # No `cache: gradle` here: the Gradle project doesn't exist until
          # `expo prebuild` runs below, so there's nothing to hash at this point.

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (generate android project)
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=armeabi-v7a,arm64-v8a

      - name: Collect & rename APK
        id: apk
        run: |
          SRC=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)
          mkdir -p dist-apk
          cp "$SRC" dist-apk/bulk-tracker.apk
          echo "Built APK: $SRC"
          echo "path=dist-apk/bulk-tracker.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bulk-tracker-apk
          path: dist-apk/bulk-tracker.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish APK to "latest" Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 📲 Latest APK
          body: |
            **מעקב מסה — ה-APK האחרון להתקנה בטלפון.**

            הורד את `bulk-tracker.apk` למטה, פתח אותו במכשיר האנדרואיד ואשר התקנה ממקור לא ידוע.

            Build `#${{ github.run_number }}` from commit ${{ github.sha }}.
          files: dist-apk/bulk-tracker.apk
          make_latest: true
